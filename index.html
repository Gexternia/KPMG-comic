<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KPMG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'KPMG', Arial, sans-serif;
      }
      .font-comic {
        font-family: 'Comic Neue', cursive !important;
      }
      h1, h2, h3, .comic-title {
        font-family: 'KPMG', Arial, sans-serif;
        letter-spacing: 1px;
        font-weight: bold;
      }
      .swal2-popup.kpmg-comic-alert {
        border: 4px solid #000 !important;
        border-radius: 0 !important;
        box-shadow: 10px 10px 0 #000 !important;
        padding: 2rem !important;
      }
      .swal2-title.kpmg-comic-alert-title {
        color: #00338D !important;
        font-family: 'KPMG', Arial, sans-serif !important;
        font-size: 1.8rem !important;
        font-weight: 900 !important;
        letter-spacing: 0.5px !important;
      }
      .swal2-html-container.kpmg-comic-alert-text {
        color: #111827 !important;
        font-family: 'Comic Neue', cursive !important;
        font-size: 1.2rem !important;
        font-weight: 700 !important;
        line-height: 1.35 !important;
        white-space: pre-line !important;
      }
      .swal2-confirm.kpmg-comic-alert-button {
        background: #76D2FF !important;
        border: 4px solid #000 !important;
        border-radius: 0 !important;
        box-shadow: 6px 6px 0 #000 !important;
        color: #00338D !important;
        cursor: pointer !important;
        font-family: 'KPMG', Arial, sans-serif !important;
        font-size: 1.05rem !important;
        font-weight: 900 !important;
        letter-spacing: 0.08em !important;
        padding: 0.9rem 1.5rem !important;
        text-transform: uppercase !important;
        transition: transform 120ms ease, box-shadow 120ms ease !important;
      }
      .swal2-confirm.kpmg-comic-alert-button:active {
        box-shadow: 3px 3px 0 #000 !important;
        transform: translate(3px, 3px) !important;
      }
      .swal2-icon.kpmg-comic-alert-icon {
        border-color: #FFC700 !important;
        color: #FFC700 !important;
      }
      .print-ia-fill-height {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center center;
      }
      .print-ia-cover-stretch {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        object-fit: fill;
      }
      /* Custom Print Styles */
      @media print {
        @page {
          size: A4 landscape;
          margin: 0;
        }
        /* Anula fondos de Tailwind (cobalto) para que no quede “marco” azul alrededor del fanzine */
        html,
        body {
          margin: 0 !important;
          padding: 0 !important;
          background: white !important;
          background-color: white !important;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
        #root {
          background: white !important;
          min-height: 0 !important;
        }
        .no-print {
          display: none !important;
        }
        .print-only {
          display: grid !important;
        }

        /*
          Viñetas p1–p4: escala por altura; sobrante lateral se recorta.
          Portada / contraportada: llenan la celda con object-fit fill (estira sobre todo el alto, sin bandas arriba/abajo).
        */
        .print-ia-fill-height {
          position: absolute !important;
          top: 0 !important;
          left: 0 !important;
          width: 100% !important;
          height: 100% !important;
          object-fit: cover !important;
          object-position: center center;
        }
        .print-ia-cover-stretch {
          position: absolute !important;
          left: 0 !important;
          top: 0 !important;
          width: 100% !important;
          height: 100% !important;
          object-fit: fill !important;
        }
      }
    </style>
</head>
  <body class="bg-[#1E49E2] text-neutral-900 overflow-hidden print:!bg-white print:!overflow-visible">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
