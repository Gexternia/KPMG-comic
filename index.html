<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KPMG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'KPMG', Arial, sans-serif;
      }
      .font-comic {
        font-family: 'Comic Neue', cursive !important;
      }
      h1, h2, h3, .comic-title {
        font-family: 'KPMG', Arial, sans-serif;
        letter-spacing: 1px;
        font-weight: bold;
      }
      /* Custom Print Styles */
      @media print {
        @page {
          size: A4 landscape;
          margin: 0;
        }
        /* Anula fondos de Tailwind (cobalto) para que no quede “marco” azul alrededor del fanzine */
        html,
        body {
          margin: 0 !important;
          padding: 0 !important;
          background: white !important;
          background-color: white !important;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
        #root {
          background: white !important;
          min-height: 0 !important;
        }
        .no-print {
          display: none !important;
        }
        .print-only {
          display: grid !important;
        }

        /*
          Viñetas p1–p4: escala por altura; sobrante lateral se recorta.
          Portada / contraportada: llenan la celda con object-fit fill (estira sobre todo el alto, sin bandas arriba/abajo).
        */
        .print-ia-fill-height {
          position: absolute !important;
          top: 0 !important;
          bottom: 0 !important;
          left: 50% !important;
          transform: translateX(-50%) !important;
          height: 100% !important;
          width: auto !important;
          max-width: none !important;
        }
        .print-ia-cover-stretch {
          position: absolute !important;
          left: 0 !important;
          top: 0 !important;
          width: 100% !important;
          height: 100% !important;
          object-fit: fill !important;
        }
      }
    </style>
</head>
  <body class="bg-[#1E49E2] text-neutral-900 overflow-hidden print:!bg-white print:!overflow-visible">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
